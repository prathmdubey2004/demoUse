<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My World ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose: #e8405a;
            --blush: #f7b8c4;
            --cream: #fff8f3;
            --gold: #d4a853;
            --deep: #1a0a10;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--deep);
            font-family: 'Cormorant Garamond', serif;
            overflow-x: hidden;
            position: relative;
            padding: 24px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 30%, rgba(232,64,90,0.18) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 70%, rgba(212,168,83,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 70% 60% at 50% 50%, rgba(247,184,196,0.06) 0%, transparent 80%);
            pointer-events: none;
            animation: ambientShift 12s ease-in-out infinite alternate;
        }

        @keyframes ambientShift {
            0%   { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .petal {
            position: fixed;
            width: 8px;
            height: 12px;
            border-radius: 50% 0 50% 0;
            opacity: 0;
            animation: petalFall linear infinite;
            pointer-events: none;
        }

        @keyframes petalFall {
            0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(110vh) rotate(720deg) translateX(80px); }
        }

        /* Card */
        .card {
            position: relative;
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes cardReveal {
            0%   { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Frame layout altered to appear above text */
        .frame-outer {
            background: linear-gradient(145deg, #2e1520, #1a0a10, #2a1018);
            border-radius: 6px;
            padding: 18px 18px 22px 18px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05),
                0 30px 60px rgba(0,0,0,0.7),
                0 10px 20px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.08);
            margin-bottom: 28px;
        }

        .frame-mat {
            background: #f5ede8;
            padding: 12px 12px 40px 12px;
            border-radius: 3px;
            box-shadow:
                inset 0 2px 8px rgba(0,0,0,0.12),
                inset 0 0 0 1px rgba(0,0,0,0.08);
            position: relative;
        }

        .frame-mat::before, .frame-mat::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-color: rgba(212,168,83,0.5);
            border-style: solid;
        }
        .frame-mat::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
        .frame-mat::after  { bottom: 18px; right: 6px; border-width: 0 1px 1px 0; }

        .photo-area {
            width: 100%;
            aspect-ratio: 4/3;
            overflow: hidden;
            border-radius: 2px;
            position: relative;
        }

        .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            background: #140810;
            display: block;
            transition: transform 6s ease;
        }
        .photo-area:hover img { transform: scale(1.03); }

        .photo-area::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.25) 100%);
            pointer-events: none;
        }

        .mat-caption {
            text-align: center;
            padding-top: 10px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 14px;
            color: #5a2a35;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* Text below frame */
        .text-section {
            text-align: center;
            animation: fadeSlideUp 1s ease 0.5s both;
        }

        .intro-line {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 16px;
            color: rgba(247,184,196,0.75);
            letter-spacing: 0.5px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .main-title {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: #fde8ee;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-shadow: 0 1px 12px rgba(232,64,90,0.3);
        }

        .question-line {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 17px;
            color: rgba(247,184,196,0.85);
            margin-bottom: 28px;
            letter-spacing: 0.3px;
            animation: fadeSlideUp 1s ease 0.8s both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Buttons Stacked Vertically */
        .button-group {
            display: flex;
            flex-direction: column; /* This puts the NO button exactly below YES */
            justify-content: center;
            align-items: center;
            gap: 16px; /* Spacing between buttons */
            animation: fadeSlideUp 1s ease 1s both;
            position: relative;
        }

        .btn-yes {
            padding: 14px 44px;
            background: transparent;
            border: 1px solid rgba(232,64,90,0.55);
            border-radius: 10px;
            color: #ffc0cc;
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.4s, border-color 0.4s;
            width: 160px; /* Gives them equal width */
        }
        .btn-yes::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--rose), #c0304a);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-yes:hover { color: white; border-color: transparent; }
        .btn-yes:hover::before { transform: scaleX(1); }
        .btn-yes span { position: relative; z-index: 1; }

        .btn-no {
            padding: 14px 44px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: rgba(247,184,196,0.4);
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s; /* Removed 'position: fixed' from initial load */
            white-space: nowrap;
            width: 160px;
        }
        .btn-no:hover {
            color: rgba(247,184,196,0.5);
            box-shadow: 0 0 20px rgba(247,184,196,0.15);
        }

        /* Page transition */
        .page-transition {
            position: fixed;
            inset: 0;
            background: var(--deep);
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .page-transition.active { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>

    <div class="petal" style="left:10%; background:#e8c4cc; animation-duration:9s; animation-delay:0s;"></div>
    <div class="petal" style="left:25%; background:#d4a8b0; animation-duration:11s; animation-delay:2s;"></div>
    <div class="petal" style="left:45%; background:#f0d0d8; animation-duration:8s; animation-delay:4s;"></div>
    <div class="petal" style="left:65%; background:#e8c4cc; animation-duration:13s; animation-delay:1s;"></div>
    <div class="petal" style="left:80%; background:#d4a8b0; animation-duration:10s; animation-delay:5s;"></div>
    <div class="petal" style="left:90%; background:#f0d0d8; animation-duration:7s; animation-delay:3s;"></div>
    <div class="petal" style="left:55%; background:#e8c4cc; animation-duration:12s; animation-delay:6s;"></div>
    <div class="petal" style="left:35%; background:#d4a8b0; animation-duration:9.5s; animation-delay:7s;"></div>

    <div class="page-transition" id="pageTransition"></div>

    <div class="card">
        
        
        <div class="text-section">
            <div class="intro-line">Well, all this is part of the world,<br>but you know what is special on this day for me??</div>
            <div class="main-title">The birth of MY world 🌍❤️</div>
            <div class="frame-outer">
                <div class="frame-mat">
                    <div class="photo-area">
                        <img src="img/world.png" alt="My World">
                    </div>
                    <div class="mat-caption">My world 🌍</div>
                </div>
            </div>
        </div>

        <div class="question-line">...and it really looks so beautiful, isn't it??</div>

        <div class="button-group">
            <button class="btn-yes" onclick="goNext()">
                <span>Yes ✦</span>
            </button>
            <button class="btn-no" id="noBtn">
                <span>No</span>
            </button>
        </div>
    </div>

    <script>
        function goNext() {
            const overlay = document.getElementById('pageTransition');
            overlay.classList.add('active');
            setTimeout(() => { window.location.href = 'proposal.html'; }, 700);
        }

        // Dodging logic for No Button
        const noBtn = document.getElementById('noBtn');

        function moveButton(e) {
            // Prevent accidental click tapping on mobile
            if(e) e.preventDefault();

            // Rips the button out of the normal layout so it can fly freely
            noBtn.style.position = 'fixed';
            noBtn.style.zIndex = '9999';
            noBtn.style.margin = '0';

            const safePadding = 20; 
            const btnW = noBtn.offsetWidth;
            const btnH = noBtn.offsetHeight;

            // Calculate boundaries so it stays on screen
            const maxX = window.innerWidth - btnW - safePadding;
            const maxY = window.innerHeight - btnH - safePadding;

            // Pick random coordinates
            const randomX = Math.max(safePadding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(safePadding, Math.floor(Math.random() * maxY));

            // Apply new coordinates
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.transition = 'left 0.2s ease-out, top 0.2s ease-out';
        }

        // Activate dodge on mouse hover (PC) and touch (Mobile)
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton, { passive: false });
    </script>
</body>
</html>
