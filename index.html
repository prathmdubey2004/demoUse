<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose: #e8405a;
            --blush: #f7b8c4;
            --cream: #fff8f3;
            --gold: #d4a853;
            --deep: #1a0a10;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--deep);
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            position: relative;
        }

        /* Ambient glow layers */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 50% at 20% 30%, rgba(232,64,90,0.18) 0%, transparent 70%),
                radial-gradient(ellipse 50% 40% at 80% 70%, rgba(212,168,83,0.12) 0%, transparent 70%),
                radial-gradient(ellipse 70% 60% at 50% 50%, rgba(247,184,196,0.06) 0%, transparent 80%);
            pointer-events: none;
            animation: ambientShift 12s ease-in-out infinite alternate;
        }

        @keyframes ambientShift {
            0%   { opacity: 0.8; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* Floating petals */
        .petal {
            position: fixed;
            width: 8px;
            height: 12px;
            border-radius: 50% 0 50% 0;
            opacity: 0;
            animation: petalFall linear infinite;
            pointer-events: none;
        }

        @keyframes petalFall {
            0%   { opacity: 0; transform: translateY(-20px) rotate(0deg); }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.3; }
            100% { opacity: 0; transform: translateY(110vh) rotate(720deg) translateX(80px); }
        }

        /* Card */
        .card {
            position: relative;
            width: 360px;
            animation: cardReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes cardReveal {
            0%   { opacity: 0; transform: translateY(40px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* The "tape" strip at top */
        .tape {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%) rotate(-1.5deg);
            width: 90px;
            height: 22px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 3px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.25);
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .tape::after {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 8px);
            border-radius: 3px;
        }

        /* Main frame — thick matte board */
        .frame-outer {
            background: linear-gradient(145deg, #2e1520, #1a0a10, #2a1018);
            border-radius: 6px;
            padding: 18px 18px 22px 18px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05),
                0 30px 60px rgba(0,0,0,0.7),
                0 10px 20px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.08);
        }

        /* Inner mat — white matte passepartout */
        .frame-mat {
            background: #f5ede8;
            padding: 12px 12px 40px 12px;
            border-radius: 3px;
            box-shadow:
                inset 0 2px 8px rgba(0,0,0,0.12),
                inset 0 0 0 1px rgba(0,0,0,0.08);
            position: relative;
        }

        /* Corner brackets on mat */
        .frame-mat::before, .frame-mat::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-color: rgba(212,168,83,0.5);
            border-style: solid;
        }
        .frame-mat::before { top: 6px; left: 6px; border-width: 1px 0 0 1px; }
        .frame-mat::after  { bottom: 18px; right: 6px; border-width: 0 1px 1px 0; }
        /* More brackets via pseudo on inner */

        .photo-area {
            width: 100%;
            aspect-ratio: 4/3;
            overflow: hidden;
            border-radius: 2px;
            position: relative;
        }

        .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: center;
            background: #140810;
            display: block;
            transition: transform 6s ease;
        }
        .photo-area:hover img { transform: scale(1.03); }

        /* Photo overlay vignette */
        .photo-area::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.25) 100%);
            pointer-events: none;
        }

        /* Caption beneath photo */
        .mat-caption {
            text-align: center;
            padding-top: 10px;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 14px;
            color: #5a2a35;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        /* Login section below frame */
        .login-box {
            margin-top: 28px;
            text-align: center;
        }

        .login-label {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 22px;
            color: #fde8ee;
            letter-spacing: 1px;
            margin-bottom: 20px;
            display: block;
            text-shadow: 0 1px 12px rgba(232,64,90,0.3);
            animation: fadeSlideUp 1s ease 0.5s both;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .input-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            animation: fadeSlideUp 1s ease 0.7s both;
        }

        /* Dot inputs — two separate boxes */
        .pin-digit {
            width: 60px;
            height: 64px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            color: var(--blush);
            font-size: 28px;
            font-family: 'Playfair Display', serif;
            text-align: center;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
            -webkit-appearance: none;
            -moz-appearance: textfield;
            caret-color: var(--rose);
        }
        .pin-digit::-webkit-inner-spin-button,
        .pin-digit::-webkit-outer-spin-button { -webkit-appearance: none; }

        .pin-digit:focus {
            border-color: rgba(232,64,90,0.6);
            background: rgba(232,64,90,0.07);
            box-shadow: 0 0 20px rgba(232,64,90,0.2);
        }

        .pin-separator {
            color: rgba(247,184,196,0.85);
            font-size: 22px;
        }

        .unlock-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(232,64,90,0.55);
            border-radius: 10px;
            color: #ffc0cc;
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: color 0.4s, border-color 0.4s;
            animation: fadeSlideUp 1s ease 0.9s both;
        }
        .unlock-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--rose), #c0304a);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .unlock-btn:hover { color: white; border-color: transparent; }
        .unlock-btn:hover::before { transform: scaleX(1); }
        .unlock-btn span { position: relative; z-index: 1; }

        .hint-text {
            margin-top: 14px;
            font-size: 13px;
            color: rgba(247,184,196,0.75);
            letter-spacing: 0.5px;
            animation: fadeSlideUp 1s ease 1.1s both;
        }

        .error-msg {
            color: #ff7090;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            height: 18px;
            transition: opacity 0.3s;
            opacity: 0;
            animation: none;
            text-shadow: 0 0 10px rgba(232,64,90,0.4);
        }
        .error-msg.show { opacity: 1; animation: shake 0.4s ease; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        /* Page transition overlay */
        .page-transition {
            position: fixed;
            inset: 0;
            background: var(--deep);
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .page-transition.active { opacity: 1; pointer-events: all; }
    </style>
</head>
<body>

    <!-- Floating petals -->
    <div class="petal" style="left:10%; background:#e8c4cc; animation-duration:9s; animation-delay:0s;"></div>
    <div class="petal" style="left:25%; background:#d4a8b0; animation-duration:11s; animation-delay:2s;"></div>
    <div class="petal" style="left:45%; background:#f0d0d8; animation-duration:8s; animation-delay:4s;"></div>
    <div class="petal" style="left:65%; background:#e8c4cc; animation-duration:13s; animation-delay:1s;"></div>
    <div class="petal" style="left:80%; background:#d4a8b0; animation-duration:10s; animation-delay:5s;"></div>
    <div class="petal" style="left:90%; background:#f0d0d8; animation-duration:7s; animation-delay:3s;"></div>
    <div class="petal" style="left:55%; background:#e8c4cc; animation-duration:12s; animation-delay:6s;"></div>
    <div class="petal" style="left:35%; background:#d4a8b0; animation-duration:9.5s; animation-delay:7s;"></div>

    <div class="page-transition" id="pageTransition"></div>

    <div class="card">
        <div class="tape"></div>

        <div class="frame-outer">
            <div class="frame-mat">
                <div class="photo-area">
                    <img src="img/baby2.jpg" alt="Photo">
                </div>
                <div class="mat-caption">Just for you ❤️</div>
            </div>
        </div>

        <div class="login-box">
            <span class="login-label">Enter your secret number</span>

            <div class="error-msg" id="errorMsg">Incorrect passcode 💔</div>

            <div class="input-row">
                <input class="pin-digit" type="number" id="d1" maxlength="1" min="0" max="9" placeholder="·" oninput="moveToNext(this,'d2')">
                <span class="pin-separator">—</span>
                <input class="pin-digit" type="number" id="d2" maxlength="1" min="0" max="9" placeholder="·" oninput="checkAuto()">
            </div>

            <button class="unlock-btn" onclick="checkPasscode()">
                <span>Unlock ✦</span>
            </button>

            <div class="hint-text">Hint: your latest age · two digits</div>
        </div>
    </div>

    <script>
        // Keep only 1 char per digit box
        document.querySelectorAll('.pin-digit').forEach(el => {
            el.addEventListener('input', function() {
                if (this.value.length > 1) this.value = this.value.slice(-1);
            });
        });

        function moveToNext(current, nextId) {
            if (current.value.length >= 1) {
                document.getElementById(nextId).focus();
            }
        }

        function checkAuto() {
            const d1 = document.getElementById('d1').value;
            const d2 = document.getElementById('d2').value;
            if (d1 && d2) setTimeout(checkPasscode, 200);
        }

        function checkPasscode() {
            const d1 = document.getElementById('d1').value;
            const d2 = document.getElementById('d2').value;
            const code = d1 + d2;
            const err = document.getElementById('errorMsg');

            if (code === '21') {
                // Transition to page 2
                const overlay = document.getElementById('pageTransition');
                overlay.classList.add('active');
                setTimeout(() => {
                    window.location.href = 'welcome.html';
                }, 700);
            } else {
                err.className = '';
                void err.offsetWidth; // reflow to restart animation
                err.classList.add('show');
                document.getElementById('d1').value = '';
                document.getElementById('d2').value = '';
                document.getElementById('d1').focus();
            }
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') checkPasscode();
        });
    </script>
</body>
</html>
